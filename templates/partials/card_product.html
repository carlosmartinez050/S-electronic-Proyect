{% load static %}

<!-- Card de producto -->
<div class="product-card">
    
    <!-- Imagen con link a detalle -->
    <a href="{% url 'shop:detalle_producto' producto.slug %}" class="product-image-link">
        {% if producto.get_imagen_principal %}
            <img src="{{ producto.get_imagen_principal.imagen.url }}" 
                 alt="{{ producto.nombre }}" 
                 class="product-image">
        {% else %}
            <img src="{% static 'img/default-product.png' %}" 
                 alt="Sin imagen" 
                 class="product-image">
        {% endif %}
    </a>
    
    <!-- Contenido de la card -->
    <div class="product-info">
        
        <!-- Nombre del producto (truncado) -->
        <h3 class="product-name" title="{{ producto.nombre }}">
            {{ producto.nombre }}
        </h3>
        
        <!-- Precio + Favorito -->
        <div class="product-price-favorite">
            <p class="product-price">${{ producto.precio|floatformat:0 }}</p>
            <button class="btn-favorite" data-producto-id="{{ producto.id }}" aria-label="Añadir a favoritos">
                ❤️
            </button>
        </div>
        
        <!-- Descuento (oculto por defecto) -->
        <div class="product-discount hidden" data-producto-id="{{ producto.id }}">
            -20% (opcional)
        </div>
        
        <!-- Botón agregar al carrito -->
        <button class="btn-add-cart" onclick="agregarProducto({{ producto.id }})">
            Agregar al Carrito
        </button>
        
    </div>
    
</div>
